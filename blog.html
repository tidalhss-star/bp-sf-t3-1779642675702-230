    <style>
        /* RESET & BASE */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        /* FULL BLEED / MAX WIDTH NONE */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        @media (max-width: 768px) {
            .container {
                padding: 0 16px;
            }
        }
        /* TYPOGRAPHY – PROVOCATIVE & BOLD */
        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            line-height: 1;
            color: #fff;
            margin-bottom: 1rem;
        }
        h2 {
            font-size: 2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.01em;
            border-left: 6px solid #ff0040;
            padding-left: 1rem;
            margin: 2rem 0 1rem;
        }
        h3 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 1.5rem 0 0.5rem;
        }
        p, li {
            font-size: 1.125rem;
            margin-bottom: 1rem;
            color: #c0c0c0;
        }
        /* BRUTALIST BORDERS + ACCENT */
        .border-accent {
            border: 3px solid #ff0040;
            padding: 1.5rem;
            background: rgba(255, 0, 64, 0.05);
        }
        /* NAV */
        nav {
            background: #111;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid #ff0040;
        }
        nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }
        .nav-links a {
            color: #e0e0e0;
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: color 0.3s;
        }
        .nav-links a:hover {
            color: #ff0040;
        }
        .hamburger-menu {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }
        .hamburger-menu span {
            width: 30px;
            height: 3px;
            background: #fff;
            border-radius: 2px;
        }
        .tel-link {
            color: #ff0040;
            font-weight: 900;
            text-decoration: none;
            font-size: 1.2rem;
        }
        .tel-link:hover {
            text-decoration: underline;
        }
        @media (max-width: 768px) {
            .nav-links {
                display: none;
                flex-direction: column;
                background: #111;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                padding: 1rem;
                gap: 1rem;
                border-bottom: 2px solid #ff0040;
            }
            .nav-links.active {
                display: flex;
            }
            .hamburger-menu {
                display: flex;
            }
            h1 {
                font-size: 2.2rem;
            }
            h2 {
                font-size: 1.5rem;
            }
        }
        /* HERO */
        .hero {
            padding: 4rem 0;
            background: radial-gradient(circle at 20% 30%, #1a1a1a, #0a0a0a);
            margin-bottom: 2rem;
        }
        .hero .container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .hero p {
            font-size: 1.3rem;
            max-width: 800px;
        }
        /* SECTIONS */
        section {
            padding: 3rem 0;
        }
        .feature-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }
        @media (max-width: 768px) {

            padding-left: 1rem;
